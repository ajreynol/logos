name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        group:
          - regressions
          - cpc-examples
          - cpc-proofs
          - cpcmini
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false

      - name: Restore Lake build cache
        uses: actions/cache@v5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ matrix.group }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ matrix.group }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-

      - name: Run ${{ matrix.group }} checks
        run: bash scripts/run-ci.sh "${CI_GROUP}"
        env:
          CI_GROUP: ${{ matrix.group }}

  verify:
    if: ${{ always() }}
    needs: checks
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require every CI group to pass
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
        run: |
          if [ "${CHECKS_RESULT}" != "success" ]; then
            echo "One or more CI groups did not pass: ${CHECKS_RESULT}" >&2
            exit 1
          fi
